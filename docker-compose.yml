version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: phocus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: phocus
      POSTGRES_PASSWORD: phocus_dev_password
      POSTGRES_DB: phocus
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U phocus']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: phocus_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phocus_backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://phocus:phocus_dev_password@postgres:5432/phocus
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_this_to_a_long_random_secret_in_production_min_32_chars
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: phocus_dashboard
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend
    profiles:
      - full

volumes:
  postgres_data:
  redis_data:
